server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy YouTrack API calls (replaces Vite dev proxy in production)
    location /yt-api/ {
        # Set via: docker run -e YOUTRACK_URL=https://your-instance.youtrack.cloud
        # Default handled by envsubst at container start — see entrypoint
        proxy_pass ${YOUTRACK_URL}/api/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
